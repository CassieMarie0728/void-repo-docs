name: Apply safe platform merge

on:
  push:
    branches:
      - safe-platform-merge-20260619

permissions:
  contents: write

jobs:
  apply-remaining-safe-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and apply remaining safe merge patch
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          patch_b64 = """"""
          patch = gzip.decompress(base64.b64decode(patch_b64)).decode("utf-8")
          Path("remaining-safe-merge.patch").write_text(patch, encoding="utf-8")
          PY

          git apply remaining-safe-merge.patch
          rm remaining-safe-merge.patch
          git rm .github/workflows/apply-safe-platform-merge.yml

      - name: Commit remaining merged files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/DocToneGlossary.tsx server.ts
          git commit -m "Apply remaining safe platform merge files"
          git push
